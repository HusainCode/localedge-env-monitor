<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <div class="gauges">
      <div class="gauge">
        <h3>Temperature</h3>
        <div class="gauge-box blue">
          <span id="temp-value">19.6°C</span>
        </div>
      </div>
      <div class="gauge">
        <h3>Humidity</h3>
        <div class="gauge-box red">
          <span id="humidity-value">70.0%</span>
        </div>
      </div>
    </div>

    <div class="table-box">
      <h3>Recent Measurements</h3>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Temperature (°C)</th>
            <th>Humidity (%)</th>
          </tr>
        </thead>
        <tbody id="data-table">
          <!-- Flask will insert rows here -->
        </tbody>
      </table>
    </div>
    <div class="footer">
      <small>Last updated: <span id="last-updated">8:32:17 PM</span></small>
    </div>
  </div>
</body>
</html>
